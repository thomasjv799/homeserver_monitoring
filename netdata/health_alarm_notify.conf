#!/usr/bin/env bash
# Netdata alert notifications -> Telegram.
# alarm-notify.sh loads the stock config first, then this file (this file wins).
# Secrets are pulled from the container environment (see .env / docker-compose
# env_file) so no token is ever stored in this committed file.

# No mail server on this host — disable email to avoid failed sendmail attempts.
SEND_EMAIL="NO"

SEND_TELEGRAM="YES"
TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
DEFAULT_RECIPIENT_TELEGRAM="${TELEGRAM_CHAT_ID}"

# IMPORTANT: the stock config assigns each role_recipients_telegram[...] from
# DEFAULT_RECIPIENT_TELEGRAM while that value is still empty (stock loads before
# this file). So setting DEFAULT_RECIPIENT_TELEGRAM alone is not enough — we must
# set the per-role recipients explicitly here, or alerts silently fall back to
# email. Point every alert role at our chat ID.
role_recipients_telegram[sysadmin]="${TELEGRAM_CHAT_ID}"
role_recipients_telegram[domainadmin]="${TELEGRAM_CHAT_ID}"
role_recipients_telegram[dba]="${TELEGRAM_CHAT_ID}"
role_recipients_telegram[webmaster]="${TELEGRAM_CHAT_ID}"
role_recipients_telegram[proxyadmin]="${TELEGRAM_CHAT_ID}"
role_recipients_telegram[sitemgr]="${TELEGRAM_CHAT_ID}"
