# CPU temperature alarms — Mac mini (Intel Core i5-3210M).
#
# We target ONLY the coretemp chip's three charts (the real CPU temps). The
# applesmc chip exposes dozens of channels, some bogus on Linux (e.g. TCPG
# +103C, TH* -127C), and ALL temperature charts share the same context
# (system.hw.sensor.temperature.input) — so a context-wide template would catch
# the garbage too. Hence we name the specific coretemp chart IDs below.
#
# i5-3210M datasheet: high ~87C, critical ~105C. Warn at 85C, critical at 98C.

 alarm: cpu_package_temperature
    on: sensors.temperature_coretemp-isa-0000_temp1_Package_id_0_input
 class: Utilization
  type: System
component: CPU
lookup: max -1m
 units: Celsius
 every: 30s
  warn: $this > 85
  crit: $this > 98
 delay: down 5m
  info: CPU package temperature (coretemp)
    to: sysadmin

 alarm: cpu_core0_temperature
    on: sensors.temperature_coretemp-isa-0000_temp2_Core_0_input
 class: Utilization
  type: System
component: CPU
lookup: max -1m
 units: Celsius
 every: 30s
  warn: $this > 85
  crit: $this > 98
 delay: down 5m
  info: CPU core 0 temperature (coretemp)
    to: sysadmin

 alarm: cpu_core1_temperature
    on: sensors.temperature_coretemp-isa-0000_temp3_Core_1_input
 class: Utilization
  type: System
component: CPU
lookup: max -1m
 units: Celsius
 every: 30s
  warn: $this > 85
  crit: $this > 98
 delay: down 5m
  info: CPU core 1 temperature (coretemp)
    to: sysadmin
