# Temperature alarm — currently disabled on purpose.
#
# The Mac mini's Apple SMC (applesmc) exposes many internal channels, some of
# which report bogus values on Linux (e.g. TCPG +103C, TC0G +99C, TH* -127C).
# A generic "any sensor > 90C" alarm would false-fire on those constantly.
#
# After first launch we replace this with an alarm targeting only the
# trustworthy coretemp CPU sensors (Package id 0 / Core 0 / Core 1), once the
# live Netdata chart names/labels are known.
